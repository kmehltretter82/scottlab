name: CI

# Pull requests run this workflow directly. Pushes to main run it through
# the Pages deployment workflow (workflow_call), which gates the deploy on
# every job here, including the browser acceptance matrix.
on:
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, test, and build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      # Cover the documented minimum (Node 20.19+) and the current release.
      matrix:
        node-version: [20, 24]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  browser-acceptance:
    name: Chromium, Firefox, and WebKit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: playwright-version
        run: >
          echo "version=$(node -p
          "require('@playwright/test/package.json').version")"
          >> "$GITHUB_OUTPUT"

      - name: Cache browser engines
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: >-
            playwright-${{ runner.os }}-${{
            steps.playwright-version.outputs.version }}

      - name: Install browser engines
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Install browser system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox webkit

      - name: Run browser acceptance tests
        run: npm run test:e2e

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-acceptance-results
          path: test-results
          if-no-files-found: warn
          retention-days: 7
